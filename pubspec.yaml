name: flutter_mockkit
description: >
  A lightweight, developer-friendly toolkit to mock API requests and responses
  in Flutter apps during development. Simulate delays, errors, and dynamic
  responses without needing a real backend.
version: 1.0.0
homepage: https://github.com/parthamallick49/flutter_mockkit
repository: https://github.com/parthamallick49/flutter_mockkit
issue_tracker: https://github.com/parthamallick49/flutter_mockkit/issues


environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

topics:
  - mock
  - testing
  - http
  - networking
  - development

screenshots:
  - description: "MockKit demo showing mock/live mode toggle"
    path: screenshots/demo.png
